<!DOCTYPE html>
<html>
<head>
    <title>Visualizador Ubicuo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; transition: background 0.5s; overflow: hidden; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #menu { display: block; text-align: center; }
        .opcion { padding: 20px; margin: 10px; border: 2px solid #ccc; display: inline-block; transition: 0.3s; }
        .seleccionada { border-color: #007bff; background: #e7f3ff; transform: scale(1.1); }
        #partitura-contenedor { display: none; width: 90%; height: 80vh; border: 5px solid #333; transition: transform 0.3s; background: white; align-items: center; justify-content: center; font-size: 4rem; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Selecciona una Partitura (Mueve la cabeza)</h1>
        <div class="opcion seleccionada" id="opt0">Bach - Preludio</div>
        <div class="opcion" id="opt1">Mozart - Sonata</div>
        <div class="opcion" id="opt2">Beethoven - 5ª</div>
    </div>

    <div id="partitura-contenedor">Página 1</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let enModoPartitura = false;
        let indexMenu = 0;
        let pagina = 1;

        // --- 1. VOZ (Funcionalidad Adicional) ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.onresult = (event) => {
            const voz = event.results[event.results.length - 1][0].transcript.toLowerCase();
            if (voz.includes("inicio") || voz.includes("salir")) volverInicio();
            if (voz.includes("página")) {
                const n = voz.match(/\d+/);
                if(n) { pagina = parseInt(n[0]); actualizarUI(); }
            }
        };
        recognition.start();

        // --- 2. NAVEGACIÓN Y SELECCIÓN (Punto 3.a) ---
        socket.on('navegar-menu', (dir) => {
            if (enModoPartitura) return;
            document.getElementById(`opt${indexMenu}`).classList.remove('seleccionada');
            if (dir === 'derecha') indexMenu = (indexMenu + 1) % 3;
            else indexMenu = (indexMenu - 1 + 3) % 3;
            document.getElementById(`opt${indexMenu}`).classList.add('seleccionada');
        });

        socket.on('avanzar-pagina', () => {
            if (!enModoPartitura) { abrirPartitura(); } 
            else { pagina++; actualizarUI(); }
        });

        socket.on('retroceder-pagina', () => { if(enModoPartitura && pagina > 1) { pagina--; actualizarUI(); } });

        // --- 3. ZOOM Y SALIDA (Puntos 3.c y 3.d) ---
        socket.on('hacer-zoom', (nivel) => {
            const cont = document.getElementById('partitura-contenedor');
            cont.style.transform = `scale(${nivel})`;
        });

        socket.on('ir-inicio', volverInicio);

        function abrirPartitura() {
            enModoPartitura = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('partitura-contenedor').style.display = 'flex';
        }

        function volverInicio() {
            enModoPartitura = false;
            pagina = 1;
            document.getElementById('menu').style.display = 'block';
            document.getElementById('partitura-contenedor').style.display = 'none';
            actualizarUI();
        }

        function actualizarUI() { document.getElementById('partitura-contenedor').innerText = "Página " + pagina; }
    </script>
</body>
</html>
